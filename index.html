<style>
  :root {
    --bg: #fafaf7;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-soft: #999;
    --border: #e8e6e0;
    --accent: #ff5a1f;
    --accent-soft: #fff1eb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.7; -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  ::selection { background: var(--accent); color: white; }

  header {
    padding: 80px 24px 60px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
    text-align: center;
  }
  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 700;
    color: var(--accent); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 16px;
    padding: 5px 14px; background: var(--accent-soft);
    border-radius: 20px;
  }
  header h1 {
    font-size: 44px; font-weight: 900; letter-spacing: -1px;
    margin-bottom: 12px;
  }
  header p {
    font-size: 17px; color: var(--text-muted); font-weight: 500;
    max-width: 520px; margin: 0 auto;
  }

  main { max-width: 760px; margin: 0 auto; padding: 60px 24px 80px; }

  .section-label {
    font-size: 11px; font-weight: 800; color: var(--text-soft);
    letter-spacing: 2px; margin-bottom: 16px;
  }

  .post-list { list-style: none; }
  .post-list li { margin-bottom: 16px; }
  .post-card {
    display: block; padding: 22px 24px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; text-decoration: none; color: inherit;
    transition: all 0.2s;
  }
  .post-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255,90,31,0.08);
  }
  .post-meta {
    display: flex; gap: 12px; align-items: center;
    font-size: 12px; color: var(--text-soft); margin-bottom: 8px;
  }
  .post-tag {
    background: var(--accent-soft); color: var(--accent);
    padding: 2px 8px; border-radius: 10px; font-weight: 700;
  }
  .post-title {
    font-size: 18px; font-weight: 700; margin-bottom: 6px;
    line-height: 1.4;
  }
  .post-desc {
    font-size: 14px; color: var(--text-muted);
    line-height: 1.6;
  }

  footer {
    border-top: 1px solid var(--border); padding: 32px 24px;
    text-align: center; color: var(--text-soft); font-size: 13px;
    background: var(--bg-card);
  }
  footer a { color: var(--text-muted); }

  @media (max-width: 640px) {
    header { padding: 56px 20px 40px; }
    header h1 { font-size: 32px; }
    header p { font-size: 15px; }
    main { padding: 40px 20px 60px; }
  }
</style>
</head>
<body>

</header>

</body>
</html>
